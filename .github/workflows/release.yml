name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version
          swift --version | head -1

      # ── Rust CLI binary ──────────────────────────────────────────────

      - name: Build Rust release
        working-directory: extender
        run: |
          cargo build --release
          strip target/release/extender
          ls -lh target/release/extender

      - name: Run tests
        working-directory: extender
        run: cargo test --workspace

      # ── macOS app ────────────────────────────────────────────────────

      - name: Build macOS app
        working-directory: extender-macos/ExtenderApp
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_DIR="build/Extender.app/Contents"
          mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"

          # Copy Swift app binary
          cp extender-macos/ExtenderApp/.build/release/ExtenderApp "$APP_DIR/MacOS/Extender"

          # Embed the Rust daemon binary
          cp extender/target/release/extender "$APP_DIR/MacOS/extender-daemon"

          # Create Info.plist
          cat > "$APP_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Extender</string>
            <key>CFBundleIdentifier</key>
            <string>com.calibrae.extender</string>
            <key>CFBundleName</key>
            <string>Extender</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHumanReadableCopyright</key>
            <string>Copyright 2026 calibrae. MIT OR Apache-2.0.</string>
          </dict>
          </plist>
          PLIST

      # ── Code signing ─────────────────────────────────────────────────

      - name: Setup signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          mkdir -p ~/.private_keys
          echo -n "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Sign CLI binary
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          codesign --force \
            --sign "Developer ID Application" \
            --keychain "${RUNNER_TEMP}/build.keychain-db" \
            --options runtime \
            extender/target/release/extender

      - name: Sign app bundle
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          APP_PATH="build/Extender.app"

          # Sign the embedded daemon binary
          codesign --force \
            --sign "Developer ID Application" \
            --keychain "${RUNNER_TEMP}/build.keychain-db" \
            --options runtime \
            "$APP_PATH/Contents/MacOS/extender-daemon"

          # Sign the app bundle
          codesign --force --deep \
            --sign "Developer ID Application" \
            --keychain "${RUNNER_TEMP}/build.keychain-db" \
            --options runtime \
            "$APP_PATH"

          codesign -v "$APP_PATH"

      # ── Package ──────────────────────────────────────────────────────

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/Extender.app build/dmg/
          ln -s /Applications build/dmg/Applications

          hdiutil create -volname "Extender" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/Extender-${GITHUB_REF_NAME}.dmg"

      - name: Create CLI tarball
        run: |
          tar czf "build/extender-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" \
            -C extender/target/release extender

      - name: Notarize DMG
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun notarytool submit "build/Extender-${GITHUB_REF_NAME}.dmg" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 10m

          xcrun stapler staple "build/Extender-${GITHUB_REF_NAME}.dmg"

      # ── Checksums and Release ────────────────────────────────────────

      - name: Generate checksums
        run: |
          cd build
          shasum -a 256 \
            "Extender-${GITHUB_REF_NAME}.dmg" \
            "extender-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" \
            > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Extender $GITHUB_REF_NAME" \
            --generate-notes \
            "build/Extender-${GITHUB_REF_NAME}.dmg" \
            "build/extender-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" \
            "build/SHA256SUMS"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "${RUNNER_TEMP}/build.keychain-db" 2>/dev/null || true
          rm -f ~/.private_keys/AuthKey_*.p8 "${RUNNER_TEMP}/certificate.p12"
          rm -rf build/
