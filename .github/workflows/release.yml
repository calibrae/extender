name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── macOS (self-hosted ARM runner) ─────────────────────────────────
  build-macos:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Rust CLI
        working-directory: extender
        run: |
          cargo build --release
          strip target/release/extender

      - name: Run tests
        working-directory: extender
        run: cargo test --workspace

      - name: Build Swift app
        working-directory: extender-macos/ExtenderApp
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_DIR="build/Extender.app/Contents"
          mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"
          cp extender-macos/ExtenderApp/.build/release/ExtenderApp "$APP_DIR/MacOS/Extender"
          cp extender/target/release/extender "$APP_DIR/MacOS/extender-daemon"

          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$APP_DIR/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>Extender</string>
            <key>CFBundleIdentifier</key><string>com.calibrae.extender</string>
            <key>CFBundleName</key><string>Extender</string>
            <key>CFBundleVersion</key><string>$VERSION</string>
            <key>CFBundleShortVersionString</key><string>$VERSION</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>LSUIElement</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Setup signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          mkdir -p ~/.private_keys
          echo -n "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Sign binaries
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Sign CLI binary
          codesign --force --sign "Developer ID Application" \
            --keychain "${RUNNER_TEMP}/build.keychain-db" \
            --options runtime extender/target/release/extender

          # Sign app bundle
          codesign --force --sign "Developer ID Application" \
            --keychain "${RUNNER_TEMP}/build.keychain-db" \
            --options runtime build/Extender.app/Contents/MacOS/extender-daemon

          codesign --force --deep --sign "Developer ID Application" \
            --keychain "${RUNNER_TEMP}/build.keychain-db" \
            --options runtime build/Extender.app

          codesign -v build/Extender.app

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/Extender.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "Extender" -srcfolder build/dmg \
            -ov -format UDZO "build/Extender-${GITHUB_REF_NAME}-macOS.dmg"

      - name: Create CLI tarball
        run: |
          tar czf "build/extender-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" \
            -C extender/target/release extender

      - name: Notarize
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun notarytool submit "build/Extender-${GITHUB_REF_NAME}-macOS.dmg" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 10m
          xcrun stapler staple "build/Extender-${GITHUB_REF_NAME}-macOS.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            build/Extender-${{ github.ref_name }}-macOS.dmg
            build/extender-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "${RUNNER_TEMP}/build.keychain-db" 2>/dev/null || true
          rm -f ~/.private_keys/AuthKey_*.p8 "${RUNNER_TEMP}/certificate.p12"
          rm -rf build/

  # ── Linux (GitHub-hosted) ──────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pkg-config libusb-1.0-0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        working-directory: extender
        run: cargo build --release

      - name: Strip binary
        run: strip extender/target/release/extender

      - name: Run tests
        working-directory: extender
        run: cargo test --workspace

      - name: Create tarball
        run: |
          tar czf "extender-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz" \
            -C extender/target/release extender

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: extender-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

  # ── Windows (GitHub-hosted) ────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install libusb
        run: vcpkg install libusb:x64-windows

      - name: Build release
        working-directory: extender
        env:
          VCPKG_ROOT: C:\vcpkg
        run: cargo build --release

      - name: Run tests
        working-directory: extender
        env:
          VCPKG_ROOT: C:\vcpkg
        run: cargo test --workspace

      - name: Create zip
        run: |
          Compress-Archive -Path extender\target\release\extender.exe `
            -DestinationPath "extender-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: extender-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          find . -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Extender ${{ github.ref_name }}" \
            --generate-notes \
            macos-release/* \
            linux-release/* \
            windows-release/* \
            SHA256SUMS
